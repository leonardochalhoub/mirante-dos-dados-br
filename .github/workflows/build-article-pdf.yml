name: Build LaTeX article PDF

on:
  push:
    branches: [main]
    paths:
      - "articles/**"
      - ".github/workflows/build-article-pdf.yml"
  workflow_dispatch: {}

permissions:
  contents: write   # commits the compiled PDF back to the repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX → PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: articles/emendas-parlamentares.tex
          working_directory: articles
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -halt-on-error -file-line-error

      - name: Verify PDF was produced
        run: |
          ls -la articles/
          test -f articles/emendas-parlamentares.pdf
          echo "PDF size: $(stat -c%s articles/emendas-parlamentares.pdf) bytes"

      - name: Copy PDF to public for GH Pages
        run: |
          mkdir -p app/public/articles
          cp articles/emendas-parlamentares.pdf app/public/articles/

      - name: Commit PDF if changed
        run: |
          set -euo pipefail
          git config user.name  "mirante-bot"
          git config user.email "mirante-bot@users.noreply.github.com"
          git add articles/emendas-parlamentares.pdf app/public/articles/emendas-parlamentares.pdf
          if git diff --cached --quiet; then
            echo "PDF unchanged, nothing to commit."
            exit 0
          fi
          git commit -m "build(articles): refresh emendas-parlamentares.pdf"
          git push
