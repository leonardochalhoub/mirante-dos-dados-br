name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "data/gold/**"
      - "articles/**"
      - "scripts/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # precisamos do log do .tex pra timestamp granular

      # ─── Compile-stamp: timestamp BRT + SHA do commit do deploy gravados
      # em articles/compile-stamp.tex; cada .tex faz \input{compile-stamp}
      # e estampa "Compilada em DD/MM/YYYY às HH:MM (BRT) • <sha>" na capa.
      - name: Generate articles/compile-stamp.tex
        run: |
          TS=$(TZ='America/Sao_Paulo' date '+%d/%m/%Y às %H:%M (BRT)')
          SHA=$(git rev-parse --short HEAD)
          printf '%% AUTO-GERADO em CI por deploy-pages.yml -- nao edite a mao.\n\\newcommand{\\COMPILESTAMP}{%s}\n\\newcommand{\\COMPILESHA}{%s}\n' "$TS" "$SHA" > articles/compile-stamp.tex
          echo "─── compile-stamp.tex gerado ───"
          cat articles/compile-stamp.tex

      # ─── LaTeX article compile (Emendas) ─────────────────────────────
      # Compila articles/emendas-parlamentares.tex → PDF e copia pra
      # app/public/articles/ pro Vite empacotar no dist. Mais simples
      # do que ter um workflow separado com auto-commit (que precisa de
      # contents:write e pode falhar silenciosamente).
      - name: Compile Emendas LaTeX → PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: emendas-parlamentares.tex
          working_directory: articles
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -file-line-error

      - name: Compile Bolsa Família LaTeX → PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: bolsa-familia.tex
          working_directory: articles
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -file-line-error

      - name: Compile RAIS LaTeX → PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: rais-fair-lakehouse.tex
          working_directory: articles
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -file-line-error

      - name: Compile Equipamentos × Parkinson (WP #4) LaTeX → PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: equipamentos-rm-parkinson.tex
          working_directory: articles
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -file-line-error

      - name: Compile Equipamentos · Panorama Cross-Vertical (WP #6) LaTeX → PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: equipamentos-panorama-cnes.tex
          working_directory: articles
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -file-line-error

      - name: Compile UroPro · Cross-Vertical (WP #3) LaTeX → PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: uropro-serie-2008-2025.tex
          working_directory: articles
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -file-line-error

      - name: Compile UroPro · Saúde Pública (WP #5) LaTeX → PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: uropro-saude-publica-2008-2025.tex
          working_directory: articles
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -file-line-error

      - name: Stage PDFs + .tex sources for Vite
        run: |
          mkdir -p app/public/articles
          cp articles/emendas-parlamentares.pdf         app/public/articles/
          cp articles/bolsa-familia.pdf                 app/public/articles/
          cp articles/rais-fair-lakehouse.pdf           app/public/articles/
          cp articles/equipamentos-rm-parkinson.pdf     app/public/articles/
          cp articles/equipamentos-panorama-cnes.pdf    app/public/articles/
          cp articles/uropro-serie-2008-2025.pdf        app/public/articles/
          cp articles/uropro-saude-publica-2008-2025.pdf app/public/articles/
          # Stage .tex sources for the "Baixar fonte" button (all verticais).
          cp articles/emendas-parlamentares.tex         app/public/articles/
          cp articles/bolsa-familia.tex                 app/public/articles/
          cp articles/rais-fair-lakehouse.tex           app/public/articles/
          cp articles/equipamentos-rm-parkinson.tex     app/public/articles/
          cp articles/equipamentos-panorama-cnes.tex    app/public/articles/
          cp articles/uropro-serie-2008-2025.tex        app/public/articles/
          cp articles/uropro-saude-publica-2008-2025.tex app/public/articles/
          ls -la app/public/articles/

      # ─── Front-end build ─────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build
        working-directory: app
        env:
          VITE_BASE: /mirante-dos-dados-br/
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
