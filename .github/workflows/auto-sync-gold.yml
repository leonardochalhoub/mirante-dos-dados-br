name: Auto-sync gold from Databricks Volume

# Closes the loop "Databricks job done → site updated".
# Polls every 30 minutes (free for public repos), pulls gold JSONs from
# the Databricks UC Volume into data/gold/ and data/stats/, then commits
# + pushes IF anything changed. The push triggers deploy-pages.yml.
#
# Idempotent — `git diff --quiet` short-circuits when nothing changed.
#
# Manual trigger via workflow_dispatch for "I just ran a job, sync now".

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

# Queue concurrent runs to avoid git push races.
concurrency:
  group: gold-sync
  cancel-in-progress: false

env:
  DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Databricks CLI
        # Official install script — handles release-asset name versioning
        # (the older `/releases/latest/download/databricks_cli_linux_amd64.tar.gz`
        # URL pattern stopped working when Databricks added version numbers
        # to the asset filenames). Installs to /usr/local/bin/databricks
        # which is already on PATH on ubuntu-latest.
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sudo sh
          databricks --version

      # Pull gold JSONs from Volume. Each cp checked via `databricks fs ls`
      # FIRST — this distinguishes "file doesn't exist yet" (acceptable, skip)
      # from "cp failed for any other reason" (loud failure).
      #
      # Previously a blanket `|| echo skip` swallowed real cp failures
      # silently, leaving the user wondering why the site wasn't updating.
      - name: Pull gold JSONs + platform stats from Volume
        run: |
          set -eo pipefail
          mkdir -p data/gold data/stats

          BASE="dbfs:/Volumes/mirante_prd/gold/exports"

          # Diagnostic: dump the entire Volume listing as seen from CI.
          # If this is empty/permission-denied, that's our root cause —
          # the runner's DATABRICKS_TOKEN lacks Volume READ.
          echo "=== DIAGNOSTIC: full Volume listing from CI runner ==="
          echo "BASE = $BASE"
          databricks fs ls "$BASE" 2>&1 || echo "  (databricks fs ls returned non-zero)"
          echo "=== END DIAGNOSTIC ==="
          echo

          pull() {
            local src_file="$1"
            local dst_path="$2"
            # Probe existence + show the actual error output for transparency
            local probe
            if probe=$(databricks fs ls "$BASE/$src_file" 2>&1); then
              echo "  → pulling $src_file"
              databricks fs cp "$BASE/$src_file" "$dst_path" --overwrite
              local sz
              sz=$(stat -c %s "$dst_path" 2>/dev/null || echo "?")
              echo "  ✓ pulled $src_file ($sz bytes)"
            else
              echo "  ⚠ $src_file: probe failed → $probe"
            fi
          }

          pull gold_pbf_estados_df.json           data/gold/gold_pbf_estados_df.json
          pull gold_equipamentos_estados_ano.json data/gold/gold_equipamentos_estados_ano.json
          pull gold_emendas_estados_df.json       data/gold/gold_emendas_estados_df.json
          pull gold_uropro_estados_ano.json       data/gold/gold_uropro_estados_ano.json
          pull gold_rais_estados_ano.json         data/gold/gold_rais_estados_ano.json
          pull platform_stats.json                data/stats/platform_stats.json

          echo "---"
          ls -la data/gold/ data/stats/

      - name: Commit & push if anything changed
        run: |
          set -euo pipefail
          git config user.name  "mirante-sync-bot"
          git config user.email "mirante-sync-bot@users.noreply.github.com"

          if git diff --quiet -- data/gold/ data/stats/; then
            echo "✓ No changes in gold/stats — nothing to commit."
            exit 0
          fi

          echo "Changes detected:"
          git diff --stat -- data/gold/ data/stats/

          DATESTAMP=$(date -u +"%Y-%m-%dT%H:%MZ")
          git add data/gold/ data/stats/
          git commit -m "chore(data): auto-sync gold from Volume (${DATESTAMP})" \
                     -m "Pulled by auto-sync-gold workflow." \
                     -m "Co-Authored-By: mirante-sync-bot <noreply@github.com>"
          git push

          echo "✓ Pushed — deploy-pages.yml will rebuild the site."
