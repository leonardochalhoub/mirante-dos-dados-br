name: Auto-sync gold from Databricks Volume

# Closes the loop "Databricks job done → site updated".
# Polls every 30 minutes (free for public repos), pulls gold JSONs from
# the Databricks UC Volume into data/gold/ and data/stats/, then commits
# + pushes IF anything changed. The push triggers deploy-pages.yml.
#
# Idempotent — `git diff --quiet` short-circuits when nothing changed.
#
# Manual trigger via workflow_dispatch for "I just ran a job, sync now".

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

# Queue concurrent runs to avoid git push races.
concurrency:
  group: gold-sync
  cancel-in-progress: false

env:
  DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Databricks CLI
        # Official install script — handles release-asset name versioning
        # (the older `/releases/latest/download/databricks_cli_linux_amd64.tar.gz`
        # URL pattern stopped working when Databricks added version numbers
        # to the asset filenames). Installs to /usr/local/bin/databricks
        # which is already on PATH on ubuntu-latest.
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sudo sh
          databricks --version

      # Mirrors the proven cp pattern from refresh-pipelines.yml — file
      # destination (not directory), explicit `|| echo`. NO `set -e` here
      # because we WANT each cp to be allowed to fail (not all golds exist
      # yet on every run, e.g., uropro on first iteration).
      - name: Pull gold JSONs + platform stats from Volume
        run: |
          mkdir -p data/gold data/stats

          databricks fs cp \
            "dbfs:/Volumes/mirante_prd/gold/exports/gold_pbf_estados_df.json" \
            "data/gold/gold_pbf_estados_df.json" \
            --overwrite || echo "(PBF gold not yet generated, skip)"

          databricks fs cp \
            "dbfs:/Volumes/mirante_prd/gold/exports/gold_equipamentos_estados_ano.json" \
            "data/gold/gold_equipamentos_estados_ano.json" \
            --overwrite || echo "(Equipamentos gold not yet generated, skip)"

          databricks fs cp \
            "dbfs:/Volumes/mirante_prd/gold/exports/gold_emendas_estados_df.json" \
            "data/gold/gold_emendas_estados_df.json" \
            --overwrite || echo "(Emendas gold not yet generated, skip)"

          databricks fs cp \
            "dbfs:/Volumes/mirante_prd/gold/exports/gold_uropro_estados_ano.json" \
            "data/gold/gold_uropro_estados_ano.json" \
            --overwrite || echo "(UroPro gold not yet generated, skip)"

          databricks fs cp \
            "dbfs:/Volumes/mirante_prd/gold/exports/gold_rais_estados_ano.json" \
            "data/gold/gold_rais_estados_ano.json" \
            --overwrite || echo "(RAIS gold not yet generated, skip)"

          databricks fs cp \
            "dbfs:/Volumes/mirante_prd/gold/exports/platform_stats.json" \
            "data/stats/platform_stats.json" \
            --overwrite || echo "(platform_stats not yet generated, skip)"

          echo "---"
          ls -la data/gold/ data/stats/

      - name: Commit & push if anything changed
        run: |
          set -euo pipefail
          git config user.name  "mirante-sync-bot"
          git config user.email "mirante-sync-bot@users.noreply.github.com"

          if git diff --quiet -- data/gold/ data/stats/; then
            echo "✓ No changes in gold/stats — nothing to commit."
            exit 0
          fi

          echo "Changes detected:"
          git diff --stat -- data/gold/ data/stats/

          DATESTAMP=$(date -u +"%Y-%m-%dT%H:%MZ")
          git add data/gold/ data/stats/
          git commit -m "chore(data): auto-sync gold from Volume (${DATESTAMP})" \
                     -m "Pulled by auto-sync-gold workflow." \
                     -m "Co-Authored-By: mirante-sync-bot <noreply@github.com>"
          git push

          echo "✓ Pushed — deploy-pages.yml will rebuild the site."
