<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 50" width="220" height="50" role="img" aria-label="Claude Code">
  <rect width="220" height="50" fill="none"/>
  <!-- Anthropic mark in brand orange (works on both themes) -->
  <g transform="translate(8, 25)" stroke="#D97757" stroke-width="3" stroke-linecap="round" fill="none" style="stroke:#D97757">
    <line x1="0" y1="-12" x2="0" y2="12"/>
    <line x1="-10.4" y1="-6" x2="10.4" y2="6"/>
    <line x1="-10.4" y1="6" x2="10.4" y2="-6"/>
  </g>
  <!-- Wordmark — DARK for light background. style attribute as belt-and-suspenders. -->
  <text x="32" y="32"
        font-family="Arial, Helvetica, sans-serif"
        font-size="20" font-weight="700"
        fill="#0f172a"
        style="fill:#0f172a;font-family:Arial,Helvetica,sans-serif;font-size:20px;font-weight:700">Claude Code</text>
</svg>
