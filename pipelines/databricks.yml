# Mirante dos Dados — Databricks Asset Bundle
#
# Architecture: pure Delta tables (no DLT, no materialized views).
#   - Bronze: Auto Loader (cloudFiles) on UC Volumes → Delta append (full history)
#   - Silver: batch read latest bronze snapshot → Delta overwrite (Delta time travel)
#   - Gold:   batch joins silver tables → Delta overwrite
#
# Folder layout (one notebook per table):
#   notebooks/ingest/<source>.py    HTTP download → UC Volume (timestamped filenames)
#   notebooks/bronze/<table>.py     Auto Loader → Delta append
#   notebooks/silver/<table>.py     batch transform → Delta overwrite
#   notebooks/gold/<table>.py       batch joins → Delta overwrite
#   notebooks/export/<table>_json.py  gold table → JSON in UC Volume
#
# Job DAG cascade ensures: ingest → bronze → silver → gold → export, in order.
# Each task overwrites/appends downstream automatically because of `depends_on`.

bundle:
  name: mirante-dos-dados

variables:
  catalog:
    description: "Unity Catalog catalog name"
    default: mirante_prd

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-cafe0a5f-07e3.cloud.databricks.com

  prod:
    mode: production
    workspace:
      host: https://dbc-cafe0a5f-07e3.cloud.databricks.com
    run_as:
      user_name: ${workspace.current_user.userName}

resources:
  jobs:

    # ─── Shared dimension: populacao_uf_ano ─────────────────────────────────
    job_populacao_refresh:
      name: mirante · refresh populacao_uf_ano
      tags:
        team: mirante
        domain: populacao
        layer: orchestration
        pattern: medallion
        cadence: anual
        pii: "false"
        source: ibge_sidra
        shared_dim: "true"
      max_concurrent_runs: 1
      tasks:
        - task_key: ingest_ibge
          notebook_task:
            notebook_path: ./notebooks/ingest/ibge_populacao.py
            base_parameters:
              start_year: "2013"
              end_year:   "2026"
              volume_dir: "/Volumes/${var.catalog}/bronze/raw/ibge"

        - task_key: bronze_ibge_populacao_raw
          depends_on: [{ task_key: ingest_ibge }]
          notebook_task:
            notebook_path: ./notebooks/bronze/ibge_populacao_raw.py
            base_parameters:
              catalog: "${var.catalog}"

        - task_key: silver_populacao_uf_ano
          depends_on: [{ task_key: bronze_ibge_populacao_raw }]
          notebook_task:
            notebook_path: ./notebooks/silver/populacao_uf_ano.py
            base_parameters:
              catalog:  "${var.catalog}"
              year_min: "2013"
              year_max: "2026"

      schedule:
        quartz_cron_expression: "0 0 6 1 7 ?"   # yearly: Jul 1 6h UTC (when IBGE typically publishes)
        timezone_id: UTC
        pause_status: PAUSED

    # ─── Shared dimension: ipca_deflators_2021 ──────────────────────────────
    job_ipca_refresh:
      name: mirante · refresh ipca_deflators_2021
      tags:
        team: mirante
        domain: ipca
        layer: orchestration
        pattern: medallion
        cadence: mensal
        pii: "false"
        source: bcb_sgs
        shared_dim: "true"
      max_concurrent_runs: 1
      tasks:
        - task_key: ingest_bcb
          notebook_task:
            notebook_path: ./notebooks/ingest/bcb_ipca.py
            base_parameters:
              volume_dir: "/Volumes/${var.catalog}/bronze/raw/bcb"

        - task_key: bronze_bcb_ipca_raw
          depends_on: [{ task_key: ingest_bcb }]
          notebook_task:
            notebook_path: ./notebooks/bronze/bcb_ipca_raw.py
            base_parameters:
              catalog: "${var.catalog}"

        - task_key: silver_ipca_deflators_2021
          depends_on: [{ task_key: bronze_bcb_ipca_raw }]
          notebook_task:
            notebook_path: ./notebooks/silver/ipca_deflators_2021.py
            base_parameters:
              catalog:  "${var.catalog}"
              year_min: "2013"
              year_max: "2026"

      schedule:
        quartz_cron_expression: "0 0 6 15 * ?"  # monthly: day 15 6h UTC (IPCA publishes ~day 10)
        timezone_id: UTC
        pause_status: PAUSED

    # ─── Vertical: PBF (Bolsa Família) ──────────────────────────────────────
    job_pbf_refresh:
      name: mirante · refresh PBF (ingest → bronze → silver → gold → export)
      tags:
        team: mirante
        domain: pbf
        layer: orchestration
        pattern: medallion
        cadence: mensal
        pii: "true"
        pii_columns: nis_cpf_nome
        source: cgu_portal_transparencia
        vertical: pbf
      max_concurrent_runs: 1
      tasks:
        - task_key: ingest_cgu_pbf_zips
          notebook_task:
            notebook_path: ./notebooks/ingest/cgu_pbf_zips.py
            base_parameters:
              pbf_years:  "2013-2021"
              aux_years:  "2021-2023"
              nbf_years:  "2023-2026"
              volume_dir: "/Volumes/${var.catalog}/bronze/raw/cgu/pbf"
              workers:    "4"

        - task_key: bronze_pbf_pagamentos
          depends_on: [{ task_key: ingest_cgu_pbf_zips }]
          notebook_task:
            notebook_path: ./notebooks/bronze/pbf_pagamentos.py
            base_parameters:
              catalog:       "${var.catalog}"
              zips_dir:      "/Volumes/${var.catalog}/bronze/raw/cgu/pbf"
              csv_extracted: "/Volumes/${var.catalog}/bronze/raw/cgu/pbf_csv_extracted"

        - task_key: silver_pbf_total_uf_mes
          depends_on: [{ task_key: bronze_pbf_pagamentos }]
          notebook_task:
            notebook_path: ./notebooks/silver/pbf_total_uf_mes.py
            base_parameters:
              catalog: "${var.catalog}"

        - task_key: gold_pbf_estados_df
          depends_on: [{ task_key: silver_pbf_total_uf_mes }]
          notebook_task:
            notebook_path: ./notebooks/gold/pbf_estados_df.py
            base_parameters:
              catalog: "${var.catalog}"

        - task_key: export_pbf_estados_df_json
          depends_on: [{ task_key: gold_pbf_estados_df }]
          notebook_task:
            notebook_path: ./notebooks/export/pbf_estados_df_json.py
            base_parameters:
              catalog:     "${var.catalog}"
              output_path: "/Volumes/${var.catalog}/gold/exports/gold_pbf_estados_df.json"

        - task_key: export_platform_stats_json
          depends_on: [{ task_key: export_pbf_estados_df_json }]
          notebook_task:
            notebook_path: ./notebooks/export/platform_stats_json.py
            base_parameters:
              catalog:     "${var.catalog}"
              output_path: "/Volumes/${var.catalog}/gold/exports/platform_stats.json"

      schedule:
        quartz_cron_expression: "0 0 6 20 * ?"  # monthly: day 20 6h UTC
        timezone_id: UTC
        pause_status: PAUSED

    # ─── Vertical: Equipamentos (DATASUS CNES, all CODEQUIPs) ───────────────
    job_equipamentos_refresh:
      name: mirante · refresh Equipamentos (ingest → bronze → silver → gold → export)
      tags:
        team: mirante
        domain: equipamentos
        layer: orchestration
        pattern: medallion
        cadence: mensal
        pii: "false"
        source: datasus_cnes
        vertical: equipamentos
      max_concurrent_runs: 1
      tasks:
        - task_key: ingest_datasus_cnes_eq
          notebook_task:
            notebook_path: ./notebooks/ingest/datasus_cnes_eq.py
            base_parameters:
              max_year:   "2025"
              max_month:  "12"
              volume_dir: "/Volumes/${var.catalog}/bronze/raw/datasus/cnes_eq"
              workers:    "100"

        - task_key: bronze_cnes_equipamentos
          depends_on: [{ task_key: ingest_datasus_cnes_eq }]
          notebook_task:
            notebook_path: ./notebooks/bronze/cnes_equipamentos.py
            base_parameters:
              catalog:          "${var.catalog}"
              dbc_dir:          "/Volumes/${var.catalog}/bronze/raw/datasus/cnes_eq"
              parquet_dir:      "/Volumes/${var.catalog}/bronze/raw/datasus/cnes_eq_parquet"
              workers:          "8"
              # Set to "true" once via Workflows UI override pra wipar cache
              # de parquets antigos (com schema heterogêneo BIGINT/DOUBLE)
              # e re-converter todos os 6614 .dbc com schema unificado float64.
              force_reconvert:  "false"

        - task_key: silver_equipamentos_uf_ano
          depends_on: [{ task_key: bronze_cnes_equipamentos }]
          notebook_task:
            notebook_path: ./notebooks/silver/equipamentos_uf_ano.py
            base_parameters:
              catalog: "${var.catalog}"

        - task_key: gold_equipamentos_estados_ano
          depends_on: [{ task_key: silver_equipamentos_uf_ano }]
          notebook_task:
            notebook_path: ./notebooks/gold/equipamentos_estados_ano.py
            base_parameters:
              catalog: "${var.catalog}"

        - task_key: export_equipamentos_estados_ano_json
          depends_on: [{ task_key: gold_equipamentos_estados_ano }]
          notebook_task:
            notebook_path: ./notebooks/export/equipamentos_estados_ano_json.py
            base_parameters:
              catalog:     "${var.catalog}"
              output_path: "/Volumes/${var.catalog}/gold/exports/gold_equipamentos_estados_ano.json"

      schedule:
        quartz_cron_expression: "0 0 6 22 * ?"  # monthly: day 22 6h UTC (após PBF)
        timezone_id: UTC
        pause_status: PAUSED

    # ─── Vertical: RAIS (Ministério do Trabalho / PDET) ────────────────────
    job_rais_refresh:
      name: mirante · refresh RAIS (ingest → bronze → silver → gold → export)
      tags:
        team: mirante
        domain: rais
        layer: orchestration
        pattern: medallion
        cadence: anual
        pii: "true"
        pii_columns: cpf_pis_nome
        source: mte_pdet
        vertical: rais
      max_concurrent_runs: 1
      tasks:
        - task_key: ingest_mte_rais
          notebook_task:
            notebook_path: ./notebooks/ingest/mte_rais.py
            base_parameters:
              # Range maximalista: ingest tenta TODOS os anos; URLs ausentes são
              # ignoradas (status='missing'). Cobre desde a era moderna do PDET
              # até o último exercício completo. Bronze/silver vão filtrar pelos
              # anos que efetivamente vieram com dados.
              years:      "1985-2025"
              volume_dir: "/Volumes/${var.catalog}/bronze/raw/mte/rais"
              # workers=2: FTP server throttles aggressive parallelism (run got
              # stuck around 640/900 with workers=4). Resumable .part downloads
              # mean low parallelism is no longer a throughput problem.
              workers:    "2"

        - task_key: bronze_rais_vinculos
          depends_on: [{ task_key: ingest_mte_rais }]
          notebook_task:
            notebook_path: ./notebooks/bronze/rais_vinculos.py
            base_parameters:
              catalog:          "${var.catalog}"
              zips_dir:         "/Volumes/${var.catalog}/bronze/raw/mte/rais"
              txt_extracted:    "/Volumes/${var.catalog}/bronze/raw/mte/rais_txt_extracted"
              force_reconvert:  "false"

        - task_key: silver_rais_uf_ano
          depends_on: [{ task_key: bronze_rais_vinculos }]
          notebook_task:
            notebook_path: ./notebooks/silver/rais_uf_ano.py
            base_parameters:
              catalog: "${var.catalog}"

        - task_key: gold_rais_estados_ano
          depends_on: [{ task_key: silver_rais_uf_ano }]
          notebook_task:
            notebook_path: ./notebooks/gold/rais_estados_ano.py
            base_parameters:
              catalog: "${var.catalog}"

        - task_key: export_rais_estados_ano_json
          depends_on: [{ task_key: gold_rais_estados_ano }]
          notebook_task:
            notebook_path: ./notebooks/export/rais_estados_ano_json.py
            base_parameters:
              catalog:     "${var.catalog}"
              output_path: "/Volumes/${var.catalog}/gold/exports/gold_rais_estados_ano.json"

      schedule:
        quartz_cron_expression: "0 0 6 26 * ?"  # monthly: dia 26 6h UTC
        timezone_id: UTC
        pause_status: PAUSED

    # ─── Diagnóstico standalone: pente-fino RAIS fonte→volume→txt→bronze ──
    job_rais_integrity:
      name: mirante · diagnostics RAIS (integrity check fonte → bronze)
      tags:
        team: mirante
        domain: rais
        layer: diagnostics
        vertical: rais
      max_concurrent_runs: 1
      tasks:
        - task_key: rais_integrity_check
          notebook_task:
            notebook_path: ./notebooks/diagnostics/rais_integrity.py
            base_parameters:
              catalog:       "${var.catalog}"
              zips_dir:      "/Volumes/${var.catalog}/bronze/raw/mte/rais"
              txt_extracted: "/Volumes/${var.catalog}/bronze/raw/mte/rais_txt_extracted"

    # ─── Vertical: Emendas Parlamentares (CGU Portal Transparência) ─────────
    job_emendas_refresh:
      name: mirante · refresh Emendas (ingest → bronze → silver → gold → export)
      tags:
        team: mirante
        domain: emendas
        layer: orchestration
        pattern: medallion
        cadence: mensal
        pii: "false"
        source: cgu_portal_transparencia
        vertical: emendas
      max_concurrent_runs: 1
      tasks:
        - task_key: ingest_cgu_emendas
          notebook_task:
            notebook_path: ./notebooks/ingest/cgu_emendas.py
            base_parameters:
              years:      "2014-2025"
              volume_dir: "/Volumes/${var.catalog}/bronze/raw/cgu/emendas"
              workers:    "4"

        - task_key: bronze_emendas_pagamentos
          depends_on: [{ task_key: ingest_cgu_emendas }]
          notebook_task:
            notebook_path: ./notebooks/bronze/emendas_pagamentos.py
            base_parameters:
              catalog:       "${var.catalog}"
              zips_dir:      "/Volumes/${var.catalog}/bronze/raw/cgu/emendas"
              csv_extracted: "/Volumes/${var.catalog}/bronze/raw/cgu/emendas_csv_extracted"

        - task_key: silver_emendas_uf_ano
          depends_on: [{ task_key: bronze_emendas_pagamentos }]
          notebook_task:
            notebook_path: ./notebooks/silver/emendas_uf_ano.py
            base_parameters:
              catalog: "${var.catalog}"

        - task_key: gold_emendas_estados_df
          depends_on: [{ task_key: silver_emendas_uf_ano }]
          notebook_task:
            notebook_path: ./notebooks/gold/emendas_estados_df.py
            base_parameters:
              catalog: "${var.catalog}"

        - task_key: export_emendas_estados_df_json
          depends_on: [{ task_key: gold_emendas_estados_df }]
          notebook_task:
            notebook_path: ./notebooks/export/emendas_estados_df_json.py
            base_parameters:
              catalog:     "${var.catalog}"
              output_path: "/Volumes/${var.catalog}/gold/exports/gold_emendas_estados_df.json"

      schedule:
        quartz_cron_expression: "0 0 6 24 * ?"  # monthly: day 24 6h UTC
        timezone_id: UTC
        pause_status: PAUSED

    # ─── Vertical: UroPro (SIH/AIH — Incontinência Urinária) ────────────────
    # Reproduz e estende o trabalho de especialização em Enfermagem (Tatieli,
    # 2022) que usava agregados TabNet pré-computados. Aqui partimos dos
    # microdados RD (uma linha por AIH) — granularidade fina, atualizável,
    # extensível para outros procedimentos via parâmetro `procs_filter`.
    job_uropro_refresh:
      name: mirante · refresh UroPro (ingest → bronze → silver → gold → export)
      tags:
        team: mirante
        domain: uropro
        layer: orchestration
        pattern: medallion
        cadence: mensal
        pii: "true"
        pii_columns: n_aih_cnes_municipio
        source: datasus_sih_rd
        vertical: uropro
      max_concurrent_runs: 1
      tasks:
        - task_key: ingest_datasus_sih_rd
          notebook_task:
            notebook_path: ./notebooks/ingest/datasus_sih_rd.py
            base_parameters:
              # Cobertura máxima — TUDO. SIH-RD começa jan/1992 (folder legacy
              # 199201_200712) e segue até hoje (folder 200801_). Ingest dispara
              # em ambos os folders FTP e mescla os arquivos. Ano corrente roda
              # até max_month — gold descarta anos parciais automaticamente.
              min_year:   "1992"
              max_year:   "2025"
              max_month:  "12"
              volume_dir: "/Volumes/${var.catalog}/bronze/raw/datasus/sih_rd"
              workers:    "100"

        - task_key: bronze_sih_aih_rd_uropro
          depends_on: [{ task_key: ingest_datasus_sih_rd }]
          notebook_task:
            notebook_path: ./notebooks/bronze/sih_aih_rd_uropro.py
            base_parameters:
              catalog:      "${var.catalog}"
              dbc_dir:      "/Volumes/${var.catalog}/bronze/raw/datasus/sih_rd"
              parquet_dir:  "/Volumes/${var.catalog}/bronze/raw/datasus/sih_rd_uropro_parquet"
              workers:      "16"
              procs_filter: "0409010499,0409070270,0409020117"
              table_suffix: "uropro"

        - task_key: silver_sih_uropro_uf_ano
          depends_on: [{ task_key: bronze_sih_aih_rd_uropro }]
          notebook_task:
            notebook_path: ./notebooks/silver/sih_uropro_uf_ano.py
            base_parameters:
              catalog: "${var.catalog}"

        - task_key: gold_uropro_estados_ano
          depends_on: [{ task_key: silver_sih_uropro_uf_ano }]
          notebook_task:
            notebook_path: ./notebooks/gold/uropro_estados_ano.py
            base_parameters:
              catalog: "${var.catalog}"

        - task_key: export_uropro_estados_ano_json
          depends_on: [{ task_key: gold_uropro_estados_ano }]
          notebook_task:
            notebook_path: ./notebooks/export/uropro_estados_ano_json.py
            base_parameters:
              catalog:     "${var.catalog}"
              output_path: "/Volumes/${var.catalog}/gold/exports/gold_uropro_estados_ano.json"

      schedule:
        quartz_cron_expression: "0 0 6 26 * ?"  # monthly: day 26 6h UTC
        timezone_id: UTC
        pause_status: PAUSED

    # ─── Catalog/Schema/Table/Column metadata enrichment ────────────────────
    # Single source of truth for verbose COMMENTs and TAGS across mirante_prd.
    # Idempotent: comments are overwritten, tags are merged.
    # Run this AFTER all silver/gold refreshes — or on demand:
    #   databricks bundle run job_apply_catalog_metadata --target dev
    # Standing rule (agent memory feedback_unity_catalog_metadata.md): when
    # adding a NEW table to the catalog, append it to apply_catalog_metadata.py
    # AND emit inline COMMENT/TAGS in the creating notebook.
    job_apply_catalog_metadata:
      name: mirante · apply catalog/schema/table/column metadata + tags
      tags:
        team: mirante
        domain: meta
        layer: governance
        pattern: catalog_enrichment
        cadence: ad_hoc
        pii: "false"
        cross_domain: "true"
      max_concurrent_runs: 1
      tasks:
        - task_key: apply_metadata
          notebook_task:
            notebook_path: ./notebooks/_meta/apply_catalog_metadata.py
            base_parameters:
              catalog: "${var.catalog}"
